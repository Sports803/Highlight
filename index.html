<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sports 803 Player</title>

<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<!-- Chromecast -->
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--red:#e5181a;
--bg:#000;
--glass:rgba(0,0,0,.6);
--text:#fff;
--dim:rgba(255,255,255,.6);
}

body{background:#000;font-family:sans-serif;color:#fff;overflow:hidden}

#player{position:fixed;inset:0}

/* TOP BAR */
#topbar{
position:absolute;top:0;left:0;right:0;
display:flex;align-items:center;gap:10px;
padding:10px;
background:var(--glass);
backdrop-filter:blur(10px);
z-index:10;
}

#thumb{
width:40px;height:40px;
border-radius:6px;
object-fit:cover;
background:#111;
}

#title{
font-size:13px;
font-weight:600;
flex:1;
}

#live{color:red;font-size:11px;font-weight:700}

/* CONTROLS */
#controls{
position:absolute;
bottom:0;left:0;right:0;
display:flex;gap:8px;
padding:10px;
overflow-x:auto;
background:var(--glass);
backdrop-filter:blur(10px);
}

.btn{
padding:10px 14px;
background:#111;
border-radius:8px;
font-size:13px;
white-space:nowrap;
}

/* SHEET */
#sheet{
position:fixed;
bottom:-100%;
left:0;right:0;
background:#111;
padding:20px;
border-radius:16px 16px 0 0;
transition:.3s;
z-index:20;
}

#sheet.show{bottom:0}

.sheet-btn{
padding:14px;
background:#222;
margin-bottom:10px;
border-radius:10px;
}

/* LOADING */
#loading{
position:absolute;inset:0;
display:flex;align-items:center;justify-content:center;
background:#000;z-index:15;
}

</style>
</head>

<body>

<div id="player"></div>

<!-- TOP BAR -->
<div id="topbar">
<img id="thumb">
<div id="title">Loading…</div>
<div id="live">LIVE</div>
</div>

<!-- CONTROLS -->
<div id="controls">
<div class="btn" onclick="nextStream()">Switch</div>
<div class="btn" onclick="refresh()">Refresh</div>
<div class="btn" onclick="openSheet()">Settings</div>
<div class="btn" onclick="cast()">Cast</div>
<div class="btn" onclick="airplay()">AirPlay</div>
<div class="btn" onclick="fullscreen()">Fullscreen</div>
</div>

<!-- SETTINGS -->
<div id="sheet">
<div class="sheet-btn" onclick="nextStream()">Switch Stream</div>
<div class="sheet-btn" onclick="refresh()">Refresh</div>
<div class="sheet-btn" onclick="cast()">Chromecast</div>
<div class="sheet-btn" onclick="airplay()">AirPlay</div>
<div class="sheet-btn" onclick="fullscreen()">Fullscreen</div>
<div class="sheet-btn" onclick="closeSheet()">Close</div>
</div>

<div id="loading">Loading stream...</div>

<script>

/* STREAMS */
let streams=new URLSearchParams(location.search).getAll("mora");
let index=0;
let player;

/* INIT */
init();

function init(){
fetchMeta(); // 🔥 auto title + thumbnail
if(!streams.length){
document.getElementById("loading").innerText="No stream";
return;
}
play(streams[index]);
}

/* PLAYER */
function play(url){
document.getElementById("loading").style.display="flex";

player=jwplayer("player").setup({
file:url,
autostart:true,
width:"100%",
height:"100%"
});

player.on("ready",()=>{
document.getElementById("loading").style.display="none";
});

player.on("error",()=>nextStream());
}

/* STREAM CONTROL */
function nextStream(){
index=(index+1)%streams.length;
play(streams[index]);
toast("Switched stream");
}

function refresh(){
play(streams[index]);
toast("Refreshing...");
}

/* FULLSCREEN */
function fullscreen(){
let el=document.documentElement;
if(!document.fullscreenElement) el.requestFullscreen();
else document.exitFullscreen();
}

/* 🔥 AUTO META FETCH (Blogger / OG tags) */
function fetchMeta(){
try{
let parentDoc=window.parent.document;

// title
let title=
parentDoc.querySelector("meta[property='og:title']")?.content ||
parentDoc.title ||
"Sports 803";

document.getElementById("title").innerText=title;

// image
let img=
parentDoc.querySelector("meta[property='og:image']")?.content ||
parentDoc.querySelector("img")?.src ||
"";

if(img) document.getElementById("thumb").src=img;

}catch(e){
document.getElementById("title").innerText="Sports 803";
}
}

/* 📡 CHROMECAST */
let castSession=null;

function cast(){
if(!window.cast || !cast.framework){
toast("Cast not supported");
return;
}

const context=cast.framework.CastContext.getInstance();
context.requestSession().then(()=>{
castSession=context.getCurrentSession();

const mediaInfo=new chrome.cast.media.MediaInfo(streams[index],'video/mp4');
const request=new chrome.cast.media.LoadRequest(mediaInfo);

castSession.loadMedia(request);
toast("Casting...");
});
}

/* 🍎 AIRPLAY */
function airplay(){
let video=document.querySelector("video");

if(video && video.webkitShowPlaybackTargetPicker){
video.webkitShowPlaybackTargetPicker();
}else{
toast("AirPlay not supported");
}
}

/* UI */
function openSheet(){document.getElementById("sheet").classList.add("show")}
function closeSheet(){document.getElementById("sheet").classList.remove("show")}

/* TOAST */
function toast(msg){
let t=document.createElement("div");
t.innerText=msg;
t.style.position="absolute";
t.style.bottom="80px";
t.style.left="50%";
t.style.transform="translateX(-50%)";
t.style.background="#111";
t.style.padding="8px 16px";
t.style.borderRadius="20px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

</script>

</body>
</html>
